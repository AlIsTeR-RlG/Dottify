<!DOCTYPE html> 
<html> 
<head> 
    <title>Login - Dottify</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head> 
<body> 
    <div class="container mt-5"> 
        <div class="row justify-content-center"> 
            <div class="col-md-6"> 
                <div class="card"> 
                    <div class="card-header"> 
                        <h2 class="text-center">Login to Dottify</h2> 
                    </div> 
                    <div class="card-body"> 
                        {% if form.errors %} 
                        <div class="alert alert-danger"> 
                            Your username and password didn't match. Please try again. 
                        </div> 
                        {% endif %} 
                         
                        <!-- MAKE SURE CSRF TOKEN IS INSIDE THE FORM --> 
                        <form method="post"> 
                            {% csrf_token %}  <!-- ← THIS MUST BE INSIDE <form> tags --> 
                             
                            <div class="mb-3"> 
                                <label for="id_username" class="form-label">Username</label> 
                                {{ form.username }}  <!-- Use form field directly --> 
                            </div> 
                             
                            <div class="mb-3"> 
                                <label for="id_password" class="form-label">Password</label> 
                                {{ form.password }}  <!-- Use form field directly --> 
                            </div> 
                             
                            <div class="d-grid"> 
                                <button type="submit" class="btn btn-primary">Login</button> 
                            </div> 
                             
                            <input type="hidden" name="next" value="{{ next }}"> 
                        </form> 
                         
                        <div class="mt-3 text-center"> 
                            <a href="/" class="text-decoration-none">← Back to Home</a> 
                        </div> 
                    </div> 
                </div> 
            </div> 
        </div> 
    </div> 
</body> 
</html>
